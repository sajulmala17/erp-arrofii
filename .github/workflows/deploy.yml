name: Deploy ke Firebase

on:
  push:
    branches:
      - main        # otomatis jalan setiap push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest   # GitHub menyediakan komputer virtual untuk menjalankan ini

    steps:
      # Step 1: Ambil kode terbaru dari repo
      - name: Checkout kode
        uses: actions/checkout@v3

      # Step 2: Install dependencies (kalau pakai npm)
      - name: Install dependencies
        run: npm install

      # Step 3: Deploy ke Firebase
      - name: Deploy ke Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: er-arrofii   # ← ganti ini!