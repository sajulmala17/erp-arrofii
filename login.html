<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — ERP Al-Arrofi</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>

  <!-- Background Pattern -->
  <div class="bg-pattern">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="star8" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
          <polygon points="25,5 29,19 43,15 33,26 43,35 29,31 25,45 21,31 7,35 17,26 7,15 21,19"
                   fill="none" stroke="#c9a84c" stroke-width="0.8"/>
          <circle cx="25" cy="25" r="6" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
          <rect x="19" y="19" width="12" height="12" transform="rotate(45 25 25)"
                fill="none" stroke="#c9a84c" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect width="200" height="200" fill="url(#star8)"/>
    </svg>
  </div>

  <div class="bg-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Login Card -->
  <div class="card-wrapper">
    <div class="login-card">

      <!-- Header -->
      <div class="card-header">
        <div class="logo-wrap">
          <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 3C19 3 10 10 10 20V32H28V20C28 10 19 3 19 3Z"
                  fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M14 32V24C14 21.8 16.2 20 19 20C21.8 20 24 21.8 24 24V32"
                  stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M10 20H7M28 20H31" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="19" cy="13" r="2.5" fill="white" opacity="0.9"/>
            <path d="M6 32H32" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M19 3V1M16.5 4.5L15 3M21.5 4.5L23 3"
                  stroke="white" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <div class="logo-star">✦</div>
        </div>

        <div class="school-arabic">مدرسة الأروفي الداخلية</div>
        <div class="school-name">Pesantren Modern Al-Arrofi</div>
        <div class="divider-gold"><span></span></div>
        <div class="signin-label">Masuk ke Sistem ERP</div>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" novalidate>

        <!-- Error Box -->
        <div class="error-box" id="errorBox">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorMsg">Email atau password salah.</span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 7l10 7 10-7"/>
              </svg>
            </span>
            <input type="email" id="email" class="form-input"
                   placeholder="nama@arrofi.sch.id"
                   autocomplete="email" required />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" class="form-input"
                   placeholder="••••••••"
                   autocomplete="current-password" required />
            <button type="button" class="toggle-pw" id="togglePw"
                    aria-label="Tampilkan password">
              <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Masuk</span>
          <span class="btn-loader"><div class="spinner"></div></span>
        </button>

      </form>

      <!-- Footer -->
      <div class="card-footer">
        Butuh bantuan? Hubungi <strong>Administrator</strong>
      </div>

    </div>
  </div>

  <!-- JS (type="module" agar bisa pakai import/export) -->
  <script type="module" src="assets/js/login.js"></script>

</body>
</html>
